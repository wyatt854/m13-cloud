<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Cloud M13</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; padding: 40px; line-height: 1.6; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; margin: 0; }
        .glitch { font-size: 24px; border-bottom: 2px solid #00ff41; padding-bottom: 15px; margin-bottom: 30px; letter-spacing: 2px; text-transform: uppercase; text-shadow: 2px 0px #ff0000; text-align: center;}
        
        #login-box, #local-upload-box { border: 1px solid #00ff41; padding: 30px; background: rgba(0, 255, 65, 0.05); text-align: center; box-shadow: 0 0 15px rgba(0, 255, 65, 0.2); }
        #local-upload-box { display: none; margin-top: 20px; }
        
        input[type="password"], input[type="text"], input[type="file"] { background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 10px; font-family: 'Courier New', monospace; outline: none; margin-bottom: 15px; width: 250px; text-align: center; font-size: 16px; }
        input[type="file"] { width: auto; }
        
        button { background: #00ff41; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; font-family: 'Courier New', monospace; text-transform: uppercase; margin: 5px; }
        button:hover { background: #fff; box-shadow: 0 0 10px #fff; }
        .btn-danger { background: #ff0000; color: white; }
        .btn-danger:hover { background: #fff; color: #ff0000; box-shadow: 0 0 10px #ff0000; }
        
        #cloud-content { display: none; width: 100%; max-width: 900px; animation: fadeIn 1s; }
        #file-list { list-style: none; padding: 0; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .file-item { border: 1px solid rgba(0, 255, 65, 0.2); background: rgba(0, 255, 65, 0.02); padding: 12px; transition: 0.3s; display: flex; align-items: center; justify-content: space-between; overflow: hidden; }
        .file-item:hover { border: 1px solid #00ff41; background: rgba(0, 255, 65, 0.1); transform: translateY(-2px); }
        .file-icon { margin-right: 12px; font-weight: bold; min-width: 60px; color: #00ff41; }
        
        a.file-link { color: #fff; text-decoration: none; font-size: 14px; text-overflow: ellipsis; white-space: nowrap; overflow: hidden; display: flex; align-items: center; flex-grow: 1; }
        a.file-link:hover { color: #00ff41; }
        
        .delete-btn { background: red; color: white; border: none; padding: 5px 10px; cursor: pointer; font-size: 12px; margin-left: 10px; }
        
        .error { color: #ff0000; margin-top: 15px; font-size: 13px; font-weight: bold; }
        .success { color: #00ff41; margin-top: 15px; font-size: 13px; font-weight: bold; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="glitch">SYSTEM CLOUD M13</div>

    <div id="login-box">
        <p>> ENTRER CLÉ D'ACCÈS SYSTÈME :</p>
        <input type="password" id="pass-input" placeholder="CODE / DOSSIER" onkeypress="handleKeyPress(event)">
        <br>
        <button onclick="verifyAccess()">DÉCRYPTER</button>
        <div id="error-msg" class="error"></div>
    </div>

    <div id="local-upload-box">
        <p>> UPLOAD SÉCURISÉ (STOCKAGE LOCAL NAVIGATEUR) :</p>
        <p style="font-size: 12px; color: #888;">Attention : Limite d'environ 5Mo.</p>
        <input type="file" id="local-file-input">
        <br>
        <button onclick="saveLocalFile()">ENCODER ET SAUVEGARDER</button>
        <button class="btn-danger" onclick="retourLogin()">RETOUR</button>
        <div id="upload-status" class="success"></div>
    </div>

    <div id="cloud-content">
        <button onclick="retourLogin()" style="margin-bottom: 20px;">[X] FERMER LA SESSION</button>
        <div id="status" style="font-style: italic; margin-bottom: 20px; color: #00ff41;"></div>
        <ul id="file-list"></ul>
    </div>

    <script>
        const username = 'wyatt854';
        const repo = 'm13-cloud';
        const allowedExtensions = ['pdf', 'jpg', 'jpeg', 'png', 'gif', 'exe', 'zip', 'rar', 'mp4', 'mp3', 'txt'];

        function handleKeyPress(e) { 
            if (e.key === 'Enter') verifyAccess(); 
        }

        function retourLogin() {
            document.getElementById('login-box').style.display = 'block';
            document.getElementById('cloud-content').style.display = 'none';
            document.getElementById('local-upload-box').style.display = 'none';
            document.getElementById('pass-input').value = '';
            document.getElementById('error-msg').innerText = '';
        }

        function verifyAccess() {
            const input = document.getElementById('pass-input').value.trim();
            const upperInput = input.toUpperCase();

            document.getElementById('error-msg').innerText = "";

            if (upperInput === "M13S") {
                // RACINE DU GITHUB
                showCloudUI();
                fetchGitHubFiles(""); 
            } else if (upperInput === "LOCAL") {
                // INTERFACE D'UPLOAD LOCAL
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('local-upload-box').style.display = 'block';
                document.getElementById('upload-status').innerText = "";
            } else if (upperInput === "LSEE") {
                // VOIR LES FICHIERS LOCAUX
                showCloudUI();
                fetchLocalFiles();
            } else if (input !== "") {
                // N'IMPORTE QUEL AUTRE CODE -> CHERCHE DANS LE SOUS DOSSIER "Code/"
                showCloudUI();
                fetchGitHubFiles("Code/" + input);
            } else {
                document.getElementById('error-msg').innerText = "!! ERREUR : VEUILLEZ ENTRER UNE CLÉ !!";
            }
        }

        function showCloudUI() {
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('local-upload-box').style.display = 'none';
            document.getElementById('cloud-content').style.display = 'block';
            document.getElementById('file-list').innerHTML = "<p style='color: yellow;'>Chargement des données en cours...</p>";
        }

        // --- PARTIE GITHUB ---
        async function fetchGitHubFiles(path) {
            const listElement = document.getElementById('file-list');
            const statusText = path === "" ? "RACINE DU SYSTÈME" : "DOSSIER: " + path;
            document.getElementById('status').innerText = `> RECHERCHE DANS [${statusText}]...`;
            document.getElementById('status').style.color = "#00ff41";

            try {
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/${path}`);
                
                if (!response.ok) {
                    throw new Error("Clé invalide ou dossier introuvable.");
                }

                const files = await response.json();
                listElement.innerHTML = ""; 

                if (!Array.isArray(files)) {
                    throw new Error("La cible n'est pas un dossier valide.");
                }

                document.getElementById('status').innerText = `> RÉCUPÉRATION DES DONNÉES RÉUSSIE. [${statusText}]`;

                let filesFound = false;

                files.forEach(file => {
                    const ext = file.name.split('.').pop().toLowerCase();
                    
                    if (allowedExtensions.includes(ext)) {
                        filesFound = true;
                        const li = document.createElement('li');
                        li.className = 'file-item';
                        
                        let icon = `[${ext.toUpperCase()}]`;
                        if (['jpg','jpeg','png','gif'].includes(ext)) icon = "[IMG]";
                        if (ext === 'exe') icon = "[EXEC]";
                        
                        const a = document.createElement('a');
                        a.className = 'file-link';
                        // On utilise download_url pour avoir le vrai lien du fichier sur GitHub
                        a.href = file.download_url || file.html_url; 
                        a.target = "_blank";
                        a.innerHTML = `<span class="file-icon">${icon}</span> ${file.name.toUpperCase()}`;
                        
                        li.appendChild(a);
                        listElement.appendChild(li);
                    }
                });

                if (!filesFound) {
                    listElement.innerHTML = "<p style='color: red;'>Dossier vide ou aucun fichier autorisé trouvé.</p>";
                }

            } catch (error) {
                document.getElementById('status').innerText = `!! ÉCHEC : ${error.message} !!`;
                document.getElementById('status').style.color = "#ff0000";
                listElement.innerHTML = "";
            }
        }

        // --- PARTIE LOCAL STORAGE ---
        function saveLocalFile() {
            const fileInput = document.getElementById('local-file-input');
            const file = fileInput.files[0];
            const statusDiv = document.getElementById('upload-status');

            if (!file) {
                statusDiv.innerText = "!! VEUILLEZ SÉLECTIONNER UN FICHIER !!";
                statusDiv.className = "error";
                return;
            }

            const reader = new FileReader();
            
            reader.onload = function(e) {
                const base64Data = e.target.result;
                let files = JSON.parse(localStorage.getItem('m13_local_files') || '[]');
                
                try {
                    files.push({ 
                        id: Date.now(), 
                        name: file.name, 
                        data: base64Data,
                        type: file.name.split('.').pop().toLowerCase()
                    });
                    localStorage.setItem('m13_local_files', JSON.stringify(files));
                    
                    statusDiv.innerText = "> FICHIER ENCODÉ ET SAUVEGARDÉ AVEC SUCCÈS.";
                    statusDiv.className = "success";
                    fileInput.value = ""; // Reset de l'input
                } catch (err) {
                    statusDiv.innerText = "!! ERREUR SYSTÈME : Fichier trop lourd pour le stockage local (Limite ~5Mo) !!";
                    statusDiv.className = "error";
                }
            };
            
            // Convertit le fichier en chaine de caractère Base64
            reader.readAsDataURL(file);
        }

        function fetchLocalFiles() {
            document.getElementById('status').innerText = `> ACCÈS AUX ARCHIVES LOCALES SÉCURISÉES...`;
            document.getElementById('status').style.color = "#00ff41";
            const listElement = document.getElementById('file-list');
            listElement.innerHTML = "";

            let files = JSON.parse(localStorage.getItem('m13_local_files') || '[]');

            if (files.length === 0) {
                listElement.innerHTML = "<p style='color: red;'>Aucune donnée trouvée dans le stockage local.</p>";
                return;
            }

            files.forEach(file => {
                const li = document.createElement('li');
                li.className = 'file-item';
                
                let icon = `[${file.type.toUpperCase()}]`;
                if (['jpg','jpeg','png','gif'].includes(file.type)) icon = "[IMG]";
                
                const a = document.createElement('a');
                a.className = 'file-link';
                a.href = file.data; // Le lien est directement les données Base64
                a.download = file.name; // Force le téléchargement quand on clique
                a.innerHTML = `<span class="file-icon">${icon}</span> ${file.name.toUpperCase()}`;
                
                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'delete-btn';
                deleteBtn.innerText = "SUPPRIMER";
                deleteBtn.onclick = function() { deleteLocalFile(file.id); };

                li.appendChild(a);
                li.appendChild(deleteBtn);
                listElement.appendChild(li);
            });
        }

        function deleteLocalFile(id) {
            let files = JSON.parse(localStorage.getItem('m13_local_files') || '[]');
            files = files.filter(f => f.id !== id);
            localStorage.setItem('m13_local_files', JSON.stringify(files));
            fetchLocalFiles(); // Rafraichir la liste
        }
    </script>
</body>
</html>
