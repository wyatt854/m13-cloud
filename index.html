<!DOCTYPE html>
<html lang="fr">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Cloud M13</title>
    <style>
        #version-display {
            z-index: 999;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: rgba(0, 255, 65, 0.1);
            padding: 2px 8px;
            border-radius: 2px;
        }
        
        @media screen and (max-width: 600px) {
            #version-display { bottom: 10px; left: 10px; font-size: 8px; max-width: 50%; }
            #help-trigger { bottom: 10px; right: 10px; padding: 4px 8px; font-size: 12px; }
            #help-modal { width: 85%; right: 5%; bottom: 50px; font-size: 11px; }
            #login-box { width: 90%; padding: 15px; }
            .file-item { padding: 12px 5px; margin-bottom: 8px; border: 1px solid #222; }
        }
        
        #help-trigger { position: fixed; bottom: 20px; right: 20px; background: #00ff41; color: #000; padding: 5px 12px; font-weight: bold; cursor: pointer; border-radius: 3px; font-size: 14px; z-index: 1000; }
        #help-modal { display: none; position: fixed; bottom: 60px; right: 20px; width: 300px; background: #000; border: 1px solid #00ff41; padding: 15px; box-shadow: 0 0 20px rgba(0, 255, 65, 0.2); z-index: 1000; font-size: 12px; text-align: left; }
        #help-modal h3 { margin-top: 0; color: #fff; border-bottom: 1px solid #00ff41; padding-bottom: 5px; }
        .m13-footer { margin-top: 15px; font-size: 10px; text-align: right; color: #888; border-top: 1px dashed #444; padding-top: 5px; }
        
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; padding: 40px; line-height: 1.6; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; margin: 0; }
        .glitch { font-size: 24px; border-bottom: 2px solid #00ff41; padding-bottom: 15px; margin-bottom: 30px; letter-spacing: 2px; text-transform: uppercase; text-shadow: 2px 0px #ff0000; text-align: center;}
        
        #login-box, #local-upload-box { border: 1px solid #00ff41; padding: 30px; background: rgba(0, 255, 65, 0.05); text-align: center; box-shadow: 0 0 15px rgba(0, 255, 65, 0.2); }
        #local-upload-box { display: none; margin-top: 20px; }
        
        input[type="password"], input[type="text"], input[type="file"] { background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 10px; font-family: 'Courier New', monospace; outline: none; margin-bottom: 15px; width: 250px; text-align: center; font-size: 16px; }
        
        button { background: #00ff41; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; font-family: 'Courier New', monospace; text-transform: uppercase; margin: 5px; }
        button:hover { background: #fff; box-shadow: 0 0 10px #fff; }
        .btn-danger { background: #ff0000; color: white; }
        
        #cloud-content { display: none; width: 100%; max-width: 900px; animation: fadeIn 1s; }
        #file-list { list-style: none; padding: 0; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .file-item { border: 1px solid rgba(0, 255, 65, 0.2); background: rgba(0, 255, 65, 0.02); padding: 12px; display: flex; align-items: center; justify-content: space-between; }
        .file-item:hover { border: 1px solid #00ff41; background: rgba(0, 255, 65, 0.1); }
        
        a.file-link { color: #fff; text-decoration: none; font-size: 14px; overflow: hidden; display: flex; align-items: center; flex-grow: 1; cursor: pointer; }
        
        .error { color: #ff0000; margin-top: 15px; font-size: 13px; font-weight: bold; }
        .success { color: #00ff41; margin-top: 15px; font-size: 13px; font-weight: bold; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Visionneuse */
        #preview-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:2000; flex-direction:column; align-items:center; justify-content:center; }
        .preview-container { width:95%; height:90%; background:#050505; border:1px solid #00ff41; display:flex; flex-direction:column; }
        .preview-header { background:#00ff41; color:#000; padding:8px 15px; display:flex; justify-content:space-between; align-items:center; font-weight:bold; }
        #preview-body { flex-grow:1; overflow:auto; display:flex; justify-content:center; align-items:center; background:#000; }
        .dl-btn { background: #000; color: #00ff41; border: 1px solid #000; padding: 2px 10px; text-decoration: none; font-size: 12px; margin-right: 10px; }
        .dl-btn:hover { background: #fff; color: #000; }
    </style>
</head>
<body>
    <div id="version-display" style="position: fixed; bottom: 20px; left: 20px; color: #00ff41; font-size: 10px; font-family: 'Courier New', monospace; opacity: 0.7;">V. LOADING...</div>

    <div class="glitch">SYSTEM CLOUD M13</div>

    <div id="login-box">
        <p>> ENTRER CLÉ D'ACCÈS SYSTÈME :</p>
        <input type="password" id="pass-input" placeholder="CODE / DOSSIER" onkeypress="handleKeyPress(event)">
        <br>
        <button onclick="verifyAccess()">DÉCRYPTER</button>
        <div id="error-msg" class="error"></div>
    </div>

    <div id="local-upload-box">
        <p>> UPLOAD SÉCURISÉ :</p>
        <input type="file" id="local-file-input">
        <br>
        <button onclick="saveLocalFile()">ENCODER</button>
        <button class="btn-danger" onclick="retourLogin()">RETOUR</button>
        <div id="upload-status" class="success"></div>
    </div>

    <div id="cloud-content">
        <button onclick="retourLogin()" style="margin-bottom: 20px;">[X] FERMER LA SESSION</button>
        <div id="status" style="font-style: italic; margin-bottom: 20px; color: #00ff41;"></div>
        <ul id="file-list"></ul>
    </div>

    <div id="preview-modal">
        <div class="preview-container">
            <div class="preview-header">
                <span id="preview-title">FICHIER</span>
                <div>
                    <a id="download-btn-link" href="#" download class="dl-btn">TÉLÉCHARGER</a>
                    <span onclick="closePreview()" style="cursor:pointer;">[ FERMER X ]</span>
                </div>
            </div>
            <div id="preview-body"></div>
        </div>
    </div>

    <script>
        // 1. VISIONNEUSE
        function openPreview(url, name) {
            const modal = document.getElementById('preview-modal');
            const body = document.getElementById('preview-body');
            const title = document.getElementById('preview-title');
            const dlLink = document.getElementById('download-btn-link');
            
            let ext = name.split('.').pop().toLowerCase().trim();
            title.innerText = name.toUpperCase();
            dlLink.href = url;
            dlLink.download = name;
            
            body.innerHTML = "<p style='color:#00ff41'>CHARGEMENT DU MODULE DE VISIONNAGE...</p>";
            modal.style.display = "flex";

            setTimeout(() => {
                if (['jpg', 'jpeg', 'png', 'gif'].includes(ext)) {
                    body.innerHTML = `<img src="${url}" style="max-width:100%; max-height:100%; object-fit:contain;">`;
                } 
                else if (ext === 'pdf') {
                    body.innerHTML = `<iframe src="${url}" width="100%" height="100%" style="border:none;"></iframe>`;
                } 
                else if (['txt', 'js', 'css', 'html'].includes(ext)) {
                    fetch(url).then(res => res.text()).then(text => {
                        body.innerHTML = `<pre style="width:100%; padding:20px; color:#00ff41; white-space:pre-wrap;">${text.replace(/</g, "&lt;")}</pre>`;
                    }).catch(() => body.innerHTML = "<p>Erreur de lecture texte.</p>");
                } 
                else {
                    body.innerHTML = `<div style="text-align:center;"><p>Aperçu impossible pour ce format.</p><br><a href="${url}" download="${name}" style="color:#000; background:#00ff41; padding:10px; text-decoration:none; font-weight:bold;">CLIQUEZ ICI POUR TÉLÉCHARGER</a></div>`;
                }
            }, 300);
        }

        function closePreview() {
            document.getElementById('preview-modal').style.display = "none";
            document.getElementById('preview-body').innerHTML = "";
        }

        // Intercepteur de clic pour la visionneuse
        document.addEventListener('click', function(e) {
            let el = e.target.closest('.file-link');
            if (el && !e.target.classList.contains('delete-btn')) {
                e.preventDefault();
                const fileUrl = el.href;
                const fileName = el.getAttribute('data-name') || el.innerText.replace(/\[.*?\]\s*/, '').trim();
                openPreview(fileUrl, fileName);
            }
        });

        // 2. VERSION GITHUB
        async function updateVersion() {
            const user = 'wyatt854'; const repo = 'm13-cloud';
            try {
                const response = await fetch(`https://api.github.com/repos/${user}/${repo}/commits`);
                const commits = await response.json();
                if (Array.isArray(commits)) {
                    document.getElementById('version-display').innerText = `V.1.0.${commits.length} | CODÉ PAR M13`;
                }
            } catch (e) { document.getElementById('version-display').innerText = "V.2.1.4.50 | CODÉ PAR M13"; }
        }
        window.addEventListener('DOMContentLoaded', updateVersion);

        // 3. UI NAVIGATION
        function toggleHelp() {
            const m = document.getElementById('help-modal');
            m.style.display = (m.style.display === 'block') ? 'none' : 'block';
        }

        <h3>[ CONSOLE ]</h3>
        <p><strong>M13S</strong> : Racine</p>
        <p><strong>LOCAL</strong> : Upload</p>
        <p><strong>LSEE</strong> : Liste locale</p>
        <div class="m13-footer">CODÉ PAR M13</div>
    </div>
</body>
</html>
