<!DOCTYPE html>
<html lang="fr">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Cloud M13</title>
    
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    
    <style>
        #version-display { z-index: 999; letter-spacing: 1px; text-transform: uppercase; background: rgba(0, 255, 65, 0.1); padding: 2px 8px; border-radius: 2px; }
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; padding: 20px; line-height: 1.6; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
        .glitch { font-size: 24px; border-bottom: 2px solid #00ff41; padding-bottom: 15px; margin-bottom: 30px; text-transform: uppercase; text-align: center; width: 100%; max-width: 600px; text-shadow: 2px 0px #ff0000;}
        
        #login-box, #local-upload-box { border: 1px solid #00ff41; padding: 30px; background: rgba(0, 255, 65, 0.05); text-align: center; width: 100%; max-width: 400px; box-shadow: 0 0 15px rgba(0, 255, 65, 0.2); }
        #local-upload-box { display: none; }
        
        input { background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 10px; font-family: 'Courier New', monospace; margin-bottom: 15px; width: 80%; text-align: center; outline: none; }
        button { background: #00ff41; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; text-transform: uppercase; margin: 5px; transition: 0.3s; }
        button:hover { background: #fff; box-shadow: 0 0 10px #fff; }
        .btn-danger { background: #ff0000; color: white; }
        
        #cloud-content { display: none; width: 100%; max-width: 800px; }
        #file-list { list-style: none; padding: 0; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        
        .file-item { border: 1px solid rgba(0, 255, 65, 0.3); background: rgba(0, 255, 65, 0.05); padding: 15px; display: flex; flex-direction: column; justify-content: space-between; transition: 0.3s; }
        .file-item:hover { border-color: #fff; background: rgba(0, 255, 65, 0.1); }
        
        .file-link { color: #fff; text-decoration: none; font-weight: bold; font-size: 14px; margin-bottom: 15px; display: block; overflow: hidden; text-overflow: ellipsis; }
        .file-link:hover { color: #00ff41; }
        
        .actions { display: flex; gap: 10px; border-top: 1px solid #222; padding-top: 10px; }
        .btn-dl { flex: 1; text-align: center; background: #00ff41; color: #000; padding: 5px; text-decoration: none; font-size: 11px; font-weight: bold; }
        .btn-del { background: #ff0000; color: #fff; border: none; padding: 5px 10px; cursor: pointer; font-size: 11px; }

        #help-trigger { position: fixed; bottom: 20px; right: 20px; background: #00ff41; color: #000; padding: 5px 12px; cursor: pointer; font-weight: bold; z-index: 1000; border-radius: 2px; }
        #help-modal { display: none; position: fixed; bottom: 60px; right: 20px; width: 280px; background: #000; border: 1px solid #00ff41; padding: 15px; z-index: 1000; font-size: 12px; box-shadow: 0 0 20px rgba(0,255,65,0.3); }
    </style>
</head>
<body>
    <div id="version-display" style="position: fixed; bottom: 20px; left: 20px; color: #00ff41; font-size: 10px; opacity: 0.7;">V. LOADING...</div>

    <div class="glitch">SYSTEM CLOUD M13</div>

    <div id="login-box">
        <p>> ENTRER CLÉ SYSTÈME :</p>
        <input type="password" id="pass-input" placeholder="CODE / DOSSIER" onkeypress="if(event.key==='Enter')verifyAccess()">
        <br>
        <button onclick="verifyAccess()">DÉCRYPTER</button>
        <div id="error-msg" style="color:red; margin-top:10px; font-size: 12px;"></div>
    </div>

    <div id="local-upload-box">
        <p>> ENCODEUR LOCAL :</p>
        <input type="file" id="local-file-input"><br>
        <button onclick="saveLocalFile()">SAUVEGARDER</button>
        <button class="btn-danger" onclick="location.reload()">RETOUR</button>
        <div id="upload-status" style="margin-top:10px;"></div>
    </div>

    <div id="cloud-content">
        <button onclick="location.reload()" style="margin-bottom: 20px;">[X] FERMER LA SESSION</button>
        <div id="status" style="margin-bottom: 20px; font-style: italic; color: #00ff41;"></div>
        <div id="file-list"></div>
    </div>

    <script>
        const username = 'wyatt854';
        const repo_name = 'm13-cloud';
        const allowedExtensions = ['jpg','jpeg','png','gif','pdf','txt','mp4','mp3','zip','rar','exe'];

        function verifyAccess() {
            const val = document.getElementById('pass-input').value.trim().toUpperCase();
            if (val === 'M13S') { showCloud(); fetchGitHub(''); }
            else if (val === 'LOCAL') { document.getElementById('login-box').style.display='none'; document.getElementById('local-upload-box').style.display='block'; }
            else if (val === 'LSEE') { showCloud(); fetchLocal(); }
            else if (val !== '') { showCloud(); fetchGitHub('Code/' + val); }
            else { document.getElementById('error-msg').innerText = "!! ACCÈS REFUSÉ !!"; }
        }

        function showCloud() {
            document.getElementById('login-box').style.display='none';
            document.getElementById('cloud-content').style.display='block';
        }

        async function fetchGitHub(path) {
            const list = document.getElementById('file-list');
            document.getElementById('status').innerText = "> LECTURE DU SECTEUR : " + (path || "ROOT");
            try {
                const res = await fetch(`https://api.github.com/repos/${username}/${repo_name}/contents/${path}`);
                const data = await res.json();
                list.innerHTML = '';
                if (!Array.isArray(data)) throw new Error();

                data.forEach(file => {
                    const ext = file.name.split('.').pop().toLowerCase();
                    if (allowedExtensions.includes(ext)) {
                        const div = document.createElement('div');
                        div.className = 'file-item';
                        div.innerHTML = `
                            <a href="${file.download_url}" target="_blank" class="file-link">
                                <span style="color:#00ff41">[${ext.toUpperCase()}]</span><br>${file.name}
                            </a>
                            <div class="actions">
                                <a href="${file.download_url}" download="${file.name}" class="btn-dl">TÉLÉCHARGER</a>
                            </div>`;
                        list.appendChild(div);
                    }
                });
            } catch (e) { document.getElementById('status').innerText = "!! ERREUR SYSTÈME !!"; }
        }

        function saveLocalFile() {
            const file = document.getElementById('local-file-input').files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                let files = JSON.parse(localStorage.getItem('m13_local_files')||'[]');
                files.push({id: Date.now(), name: file.name, data: e.target.result});
                localStorage.setItem('m13_local_files', JSON.stringify(files));
                document.getElementById('upload-status').innerText = "> FICHIER ENCODÉ";
                fetchLocal();
            };
            reader.readAsDataURL(file);
        }

        function fetchLocal() {
            const list = document.getElementById('file-list');
            list.innerHTML = '';
            let files = JSON.parse(localStorage.getItem('m13_local_files')||'[]');
            files.forEach(f => {
                const div = document.createElement('div');
                div.className = 'file-item';
                div.innerHTML = `
                    <a href="${f.data}" target="_blank" class="file-link">
                        <span style="color:yellow">[LOCAL]</span><br>${f.name}
                    </a>
                    <div class="actions">
                        <a href="${f.data}" download="${f.name}" class="btn-dl">TÉLÉCHARGER</a>
                        <button class="btn-del" onclick="deleteLocal(${f.id})">X</button>
                    </div>`;
                list.appendChild(div);
            });
            document.getElementById('status').innerText = "> ARCHIVES LOCALES";
        }

        function deleteLocal(id) {
            let files = JSON.parse(localStorage.getItem('m13_local_files')||'[]').filter(f => f.id !== id);
            localStorage.setItem('m13_local_files', JSON.stringify(files));
            fetchLocal();
        }

        async function updateVersion() {
            try {
                const res = await fetch(`https://api.github.com/repos/${username}/${repo_name}/commits`);
                const data = await res.json();
                document.getElementById('version-display').innerText = `V.3.1.${data.length} | BY M13`;
            } catch(e) { document.getElementById('version-display').innerText = "V.3.0.0 | M13"; }
        }
        updateVersion();
    </script>

    <div id="help-trigger" onclick="m=document.getElementById('help-modal');m.style.display=(m.style.display==='block')?'none':'block'">? AIDE</div>
    <div id="help-modal">
        <h3 style="border-bottom:1px solid #00ff41">COMMANDES</h3>
        <p><strong> NEW (Code personalisé)</strong>:Utiliser le code donné par un utilisateur pour acceder à son cloud !</p>
        <p><strong>LOCAL</strong> : Encodage</p>
        <p><strong>LSEE</strong> : Liste locale</p>
    </div>
</body>
</html>
